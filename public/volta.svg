      .olta { fill: #ffffff; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 20px; letter-spacing: -0.5px; }
    </style>
  </defs>
  <rect x="0" y="2" width="28" height="28" rx="4" class="box" />
